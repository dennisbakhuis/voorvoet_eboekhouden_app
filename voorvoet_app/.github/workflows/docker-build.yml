name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "export PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Export dependencies to requirements.txt
        run: poetry export --without-hashes --format=requirements.txt > requirements.txt

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          version=$(grep -oP '(?<=^version = ")[^"]*' pyproject.toml)
          echo "software_version=$version" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build --platform=linux/amd64 -t voorvoet_eboekhouden_app:${{ env.software_version }} .
          docker tag voorvoet_eboekhouden_app:${{ env.software_version }} dennisbakhuis/voorvoet_eboekhouden_app:${{ env.software_version }}
          docker tag voorvoet_eboekhouden_app:${{ env.software_version }} dennisbakhuis/voorvoet_eboekhouden_app:latest

      - name: Push Docker images
        run: |
          docker push dennisbakhuis/voorvoet_eboekhouden_app:${{ env.software_version }}
          docker push dennisbakhuis/voorvoet_eboekhouden_app:latest
